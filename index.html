<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой Космический Навигатор: 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            position: relative;
        }

        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            margin-top: 20vh;
        }

        h1 {
            font-size: 3rem;
            background: linear-gradient(to right, #ff7eee, #7e7bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="space_animation.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

    <div class="content">
        <h1>С Днём Рождения!</h1>
        <p>Твой Космический Навигатор: 2026</p>
        <button class="btn" onclick="this.textContent='Звук включён'; this.disabled=true; document.getElementById('video-bg').muted=false;">
            🔊 Включить звук
        </button>
    </div>

</body>
</html>
