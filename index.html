<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Твой Космический Навигатор: 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            color: #e0e7ff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            position: relative;
        }

        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            margin-top: 20vh;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #ff7eee, #7e7bff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.2rem;
            max-width: 800px;
            margin: 0 auto 1rem;
        }

        .btn {
            background: linear-gradient(45deg, #7e7bff, #ff7eee);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 20px;
        }

        .btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="space_animation.mp4" type="video/mp4">
        Ваш браузер не поддерживает видео.
    </video>

    <div class="content">
        <h1>Твой Космический Навигатор: 2026</h1>
        <p>Год, когда звезды работают на тебя. Это не просто гороскоп — это твоя персональная карта Варшапхалы. В центре событий — Ты.</p>
        <button class="btn" onclick="document.getElementById('video-bg').muted=false; this.textContent='Звук включён'; this.disabled=true;">
            🔊 Включить звук
        </button>
    </div>

</body>
</html>
